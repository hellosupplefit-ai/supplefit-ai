<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SuppleFit AI — Find Your Stack</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D1B2A;
      --blue: #2E7CF6;
      --white: #FFFFFF;
      --off: #F0F2F5;
      --mid: #64748b;
      --inter: 'Inter', sans-serif;
    }
    body {
      background: linear-gradient(160deg, #f8faff 0%, #eef3ff 60%, #f0f2f5 100%);
      min-height: 100vh;
      font-family: var(--inter);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .wrap { width: 100%; max-width: 520px; }
    .logo { text-align: center; margin-bottom: 32px; font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .logo span { color: var(--blue); }
    .progress-wrap { margin-bottom: 28px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 0.72rem; font-weight: 600; color: #94a3b8; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
    .progress-track { height: 3px; background: rgba(0,0,0,0.08); border-radius: 99px; }
    .progress-fill { height: 100%; background: var(--blue); border-radius: 99px; transition: width 0.4s ease; }
    .card { background: white; border-radius: 20px; padding: 40px 36px; box-shadow: 0 4px 32px rgba(0,0,0,0.07); animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .q-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
    .q-title { font-size: 1.5rem; font-weight: 800; color: var(--navy); letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 28px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option { display: flex; align-items: center; gap: 14px; padding: 13px 18px; border-radius: 12px; border: 1.5px solid rgba(0,0,0,0.08); background: var(--off); cursor: pointer; transition: all 0.15s; font-size: 0.9rem; font-weight: 500; color: #475569; text-align: left; width: 100%; }
    .option:hover { border-color: var(--blue); color: var(--navy); background: #eef3ff; }
    .option.selected { border-color: var(--blue); background: #eef3ff; color: var(--navy); }
    .option-icon { font-size: 1.15rem; width: 26px; text-align: center; flex-shrink: 0; }
    .btn-next { margin-top: 24px; width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 12px; font-family: var(--inter); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(46,124,246,0.3); }
    .btn-next:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
    .btn-next:not(:disabled):hover { background: #1a6ae0; transform: translateY(-1px); }
    .loading { text-align: center; padding: 56px 36px; }
    .spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid rgba(46,124,246,0.15); border-top-color: var(--blue); animation: spin 0.75s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 1.3rem; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
    .loading-sub { font-size: 0.875rem; color: var(--mid); }
    .results { animation: fadeUp 0.4s ease; }
    .results-header { background: var(--navy); border-radius: 20px 20px 0 0; padding: 32px 36px; }
    .results-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #7ab8ff; margin-bottom: 8px; }
    .results-title { font-size: 1.5rem; font-weight: 800; color: white; letter-spacing: -0.02em; }
    .results-body { background: white; border-radius: 0 0 20px 20px; padding: 32px 36px; box-shadow: 0 8px 40px rgba(0,0,0,0.1); }
    .result-text { font-size: 0.9rem; line-height: 1.8; color: #475569; white-space: pre-wrap; }
    .error-box { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 10px; padding: 16px; margin-bottom: 16px; font-size: 0.85rem; color: #c53030; }
    .restart-btn { margin-top: 24px; width: 100%; padding: 13px; background: transparent; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 10px; font-family: var(--inter); font-size: 0.875rem; font-weight: 600; color: #94a3b8; cursor: pointer; transition: all 0.2s; }
    .restart-btn:hover { border-color: var(--navy); color: var(--navy); }
    .powered { text-align: center; margin-top: 18px; font-size: 0.7rem; color: #94a3b8; letter-spacing: 0.06em; }
    .powered span { color: var(--blue); font-weight: 600; }
    @media (max-width: 480px) { .card, .results-header, .results-body { padding: 28px 22px; } .q-title { font-size: 1.3rem; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">Supple<span>Fit</span> AI</div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressText">Question 1 of 5</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div id="quizArea"></div>
  <div class="powered">Powered by <span>SuppleFit AI</span></div>
</div>

<script>
const questions = [
  { label: "Your training", title: "What type of gym do you train at?", options: [
    { icon: "🏋️", label: "Weightlifting / CrossFit" },
    { icon: "🏃", label: "Fitness studio / Bootcamp" },
    { icon: "🥊", label: "Combat sports / Martial arts" },
    { icon: "🧘", label: "Yoga / Pilates / Wellness" },
    { icon: "🏊", label: "General gym / Mixed" },
  ]},
  { label: "Your goal", title: "What's your main goal right now?", options: [
    { icon: "💪", label: "Build muscle & strength" },
    { icon: "🔥", label: "Lose fat & get lean" },
    { icon: "⚡", label: "More energy & endurance" },
    { icon: "🔄", label: "Recover faster" },
    { icon: "🧠", label: "Overall health & wellbeing" },
  ]},
  { label: "Training volume", title: "How often do you train per week?", options: [
    { icon: "1️⃣", label: "1–2 sessions (casual)" },
    { icon: "3️⃣", label: "3–4 sessions (regular)" },
    { icon: "5️⃣", label: "5–6 sessions (serious)" },
    { icon: "🔥", label: "Daily or twice a day" },
  ]},
  { label: "Your diet", title: "How would you describe your diet?", options: [
    { icon: "🥩", label: "High protein, meat-based" },
    { icon: "🌱", label: "Plant-based / vegan" },
    { icon: "🍚", label: "Balanced / mixed" },
    { icon: "🤷", label: "No specific plan" },
  ]},
  { label: "Experience", title: "How long have you been training?", options: [
    { icon: "🌱", label: "Under 1 year" },
    { icon: "📈", label: "1–3 years" },
    { icon: "🏆", label: "3+ years" },
    { icon: "🥇", label: "I compete / train professionally" },
  ]}
];

let current = 0, answers = [];

function updateProgress() {
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Question ${Math.min(current+1, questions.length)} of ${questions.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
}

function renderQuestion() {
  updateProgress();
  const q = questions[current];
  document.getElementById('quizArea').innerHTML = `
    <div class="card">
      <div class="q-label">${q.label}</div>
      <div class="q-title">${q.title}</div>
      <div class="options">
        ${q.options.map((o,i) => `
          <button class="option" onclick="selectOption(this,${i})">
            <span class="option-icon">${o.icon}</span>
            <span>${o.label}</span>
          </button>`).join('')}
      </div>
      <button class="btn-next" id="nextBtn" disabled onclick="nextQuestion()">
        ${current === questions.length-1 ? 'Build my supplement plan →' : 'Continue →'}
      </button>
    </div>`;
}

function selectOption(el, index) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
  window._selectedIndex = index;
}

function nextQuestion() {
  const q = questions[current];
  answers.push({ q: q.title, a: q.options[window._selectedIndex].label });
  current++;
  if (current >= questions.length) {
    showLoading();
    setTimeout(getRecommendation, 600);
  } else {
    renderQuestion();
  }
}

function showLoading() {
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('quizArea').innerHTML = `
    <div class="card loading">
      <div class="spinner"></div>
      <div class="loading-title">Building your plan...</div>
      <div class="loading-sub">Analysing your profile and goals</div>
    </div>`;
}

async function getRecommendation() {
  const profile = answers.map(a => `• ${a.q}: ${a.a}`).join('\n');
  const prompt = `You are SuppleFit AI, a premium supplement advisor for gym members. A member just completed a quiz.

Their profile:
${profile}

Write a personalised supplement recommendation using EXACTLY this format (use the arrow → and section headers as shown):

YOUR PERSONALISED SUPPLEMENT PLAN

[Write 2 sentences summarising their profile and what they need most]

RECOMMENDED STACK:

→ [Supplement Name]
Benefit: [one sentence]
Dose & timing: [specific recommendation]
Why for you: [one sentence tied to their specific goal]

→ [Supplement Name]
Benefit: [one sentence]
Dose & timing: [specific recommendation]
Why for you: [one sentence tied to their specific goal]

→ [Supplement Name]
Benefit: [one sentence]
Dose & timing: [specific recommendation]
Why for you: [one sentence tied to their specific goal]

→ [Supplement Name]
Benefit: [one sentence]
Dose & timing: [specific recommendation]
Why for you: [one sentence tied to their specific goal]

PRO TIP:
[One practical, specific tip for their goal and training type]

Be confident, specific, and sound like a knowledgeable coach — not a generic supplement brand. Recommend exactly 4 supplements.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json",
        "x-api-key": "YOUR-API-KEY-HERE",
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API error ${res.status}: ${err}`);
    }

    const data = await res.json();

    if (!data.content || !data.content.length) {
      throw new Error('Empty response from API');
    }

    const text = data.content.map(i => i.type === 'text' ? i.text : '').filter(Boolean).join('');
    if (!text.trim()) throw new Error('No text in response');

    showResults(text);
  } catch(e) {
    console.error('Error:', e);
    showResults(null, e.message);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showResults(text, errorMsg) {
  const errorHtml = errorMsg ? `<div class="error-box">⚠️ Could not load AI recommendation: ${escHtml(errorMsg)}. Please try again.</div>` : '';
  const resultHtml = text ? `<div class="result-text">${escHtml(text)}</div>` : '';

  document.getElementById('quizArea').innerHTML = `
    <div class="results">
      <div class="results-header">
        <div class="results-label">Your personalised plan</div>
        <div class="results-title">${text ? "Here's your supplement stack" : "Something went wrong"}</div>
      </div>
      <div class="results-body">
        ${errorHtml}
        ${resultHtml}
        <button class="restart-btn" onclick="restart()">↺ Start over</button>
      </div>
    </div>`;
}

function restart() {
  current = 0; answers = [];
  document.getElementById('progressWrap').style.display = 'block';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
