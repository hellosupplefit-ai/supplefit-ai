<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SuppleFit AI — Gym Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0D1B2A; --blue: #2E7CF6; --off: #F0F2F5; --mid: #64748b; --inter: 'Inter', sans-serif; }
    body {
      background: linear-gradient(160deg, #f8faff 0%, #eef3ff 60%, #f0f2f5 100%);
      min-height: 100vh; font-family: var(--inter);
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
    }
    .logo { font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 32px; text-align: center; }
    .logo span { color: var(--blue); }
    .card { background: white; border-radius: 20px; padding: 40px 36px; box-shadow: 0 4px 32px rgba(0,0,0,0.07); width: 100%; max-width: 420px; }
    .tabs { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 2px solid var(--off); }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 0.9rem; font-weight: 600; color: var(--mid); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    h2 { font-size: 1.5rem; font-weight: 800; color: var(--navy); letter-spacing: -0.02em; margin-bottom: 6px; }
    .subtitle { font-size: 0.85rem; color: var(--mid); margin-bottom: 28px; line-height: 1.6; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--navy); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 10px; font-family: var(--inter); font-size: 0.9rem; color: var(--navy); transition: border-color 0.2s; }
    input:focus { outline: none; border-color: var(--blue); }
    .btn { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 10px; font-family: var(--inter); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(46,124,246,0.3); margin-top: 8px; }
    .btn:hover { background: #1a6ae0; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .alert-error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; }
    .alert-success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
    .back-link { text-align: center; margin-top: 24px; }
    .back-link a { color: #94a3b8; font-size: 0.8rem; text-decoration: none; }
    .back-link a:hover { color: var(--navy); }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<div class="logo">Supple<span>Fit</span> AI</div>

<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Log in</div>
    <div class="tab" onclick="switchTab('signup')">Sign up</div>
  </div>

  <div id="alertBox" class="alert"></div>

  <!-- LOGIN PANEL -->
  <div id="loginPanel" class="panel active">
    <h2>Welcome back</h2>
    <p class="subtitle">Log in to access your gym dashboard.</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="owner@yourgym.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Log in to dashboard →</button>
  </div>

  <!-- SIGNUP PANEL -->
  <div id="signupPanel" class="panel">
    <h2>Create your account</h2>
    <p class="subtitle">Already paid? Set up your gym account here.</p>
    <div class="form-group">
      <label>Gym Name</label>
      <input type="text" id="signupGymName" placeholder="e.g. London CrossFit"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="owner@yourgym.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min 8 characters"/>
    </div>
    <button class="btn" id="signupBtn" onclick="signup()">Create my account →</button>
  </div>
</div>

<div class="back-link"><a href="/">← Back to supplefitai.com</a></div>

<script>
  // Init Supabase
  const { createClient } = supabase;
  const sb = createClient(
    'https://vdzuosikdctqedwejrwf.supabase.co',
    'sb_publishable_8fKlC27LlvfVk19p7GycqQ_dqf8F40G'
  );

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
    document.getElementById(tab + 'Panel').classList.add('active');
    hideAlert();
  }

  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showAlert('Please fill in all fields.', 'error');

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      showAlert(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Log in to dashboard →';
      return;
    }

    // Get gym slug for this user
    const { data: gym } = await sb.from('gyms').select('slug').eq('email', email).single();
    if (gym) {
      window.location.href = `/dashboard?gym=${gym.slug}`;
    } else {
      window.location.href = '/dashboard';
    }
  }

  async function signup() {
    const gymName = document.getElementById('signupGymName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (!gymName || !email || !password) return showAlert('Please fill in all fields.', 'error');
    if (password.length < 8) return showAlert('Password must be at least 8 characters.', 'error');

    const btn = document.getElementById('signupBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';

    const { data, error } = await sb.auth.signUp({ email, password });

    if (error) {
      showAlert(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Create my account →';
      return;
    }

    // Auto-create gym profile
    const slug = gymName.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    await fetch('/api/gym', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: gymName, email, slug, logo_url: '' })
    });

    showAlert('Account created! Check your email to confirm, then log in.', 'success');
    btn.disabled = false;
    btn.textContent = 'Create my account →';
    setTimeout(() => switchTab('login'), 3000);
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className = `alert alert-${type}`;
    box.style.display = 'block';
  }

  function hideAlert() {
    document.getElementById('alertBox').style.display = 'none';
  }

  // Check if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/dashboard';
  });
</script>
</body>
</html>
